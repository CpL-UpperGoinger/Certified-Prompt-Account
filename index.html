<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>注册快记师 - Cupper的智能记账助手</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --green: #10b981;
            --red: #ef4444;
            --gold: #d4a745;
            --black: #1a1a2e;
            --blue: #3b82f6;
            --blue-hover: #2563eb;
            --gray: #9ca3af;
            --gray-light: #e5e7eb;
            --gray-bg: #f3f4f6;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.15);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #e8ecf1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            height: 92vh;
            max-height: 880px;
            background: var(--bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 460px) {
            .app-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
        }

        /* 页面通用样式 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: none;
            flex-direction: column;
            z-index: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            animation: pageSlideIn 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .page.active {
            display: flex;
            z-index: 1;
        }

        .page.z-10 {
            z-index: 10;
        }
        .page.z-20 {
            z-index: 20;
        }
        .page.z-30 {
            z-index: 30;
        }
        .page.z-40 {
            z-index: 40;
        }
        .page.z-50 {
            z-index: 50;
        }

        @keyframes pageSlideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 页面头部 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .page-header .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ef4444;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .page-header .close-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        .page-header .close-btn:active {
            transform: scale(0.94);
        }

        .page-header .title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
            text-align: center;
            flex: 1;
        }

        .page-header .placeholder {
            width: 32px;
            flex-shrink: 0;
        }

        /* 页面内容 */
        .page-content {
            flex: 1;
            padding: 16px 18px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 100px;
        }

        /* 首页 */
        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, #f8fafc 0%, #f5f5f7 40%, #eef1f5 100%);
        }

        .home-page .logo-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 28px rgba(59, 130, 246, 0.35);
            font-size: 34px;
            color: #fff;
        }

        .home-page .app-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .home-page .app-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }

        .home-page .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.2px;
            white-space: nowrap;
            text-decoration: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover {
            background: var(--blue-hover);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: #fff;
            color: var(--text);
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .btn-secondary:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }
        .btn-gray {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            pointer-events: none;
        }
        .btn-blue {
            background: var(--blue);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
            pointer-events: auto;
        }
        .btn-red {
            background: #ef4444;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
        }
        .btn-outline-blue {
            background: #fff;
            color: var(--blue);
            border: 1.5px solid var(--blue);
            cursor: pointer;
        }

        /* 类型选择页 */
        .type-select-page .option-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .type-select-page .option-card:hover {
            border-color: var(--blue);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }
        .type-select-page .option-card:active {
            transform: scale(0.98);
        }
        .type-select-page .option-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .type-select-page .option-icon.daily {
            background: #eff6ff;
            color: #3b82f6;
        }
        .type-select-page .option-icon.business {
            background: #fef3c7;
            color: #d97706;
        }
        .type-select-page .option-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }
        .type-select-page .option-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 表单 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .form-group label .required-star {
            color: #ef4444;
            font-size: 13px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-family: inherit;
            transition: all var(--transition);
            background: #fff;
            color: var(--text);
            outline: none;
            -webkit-appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }
        .form-group .hint {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 1px;
        }

        /* 计算结果区 */
        .calc-result-area {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border: 1.5px dashed #d1d5db;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .calc-result-area .calc-item {
            text-align: center;
        }
        .calc-result-area .calc-item .calc-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
            letter-spacing: 0.3px;
        }
        .calc-result-area .calc-item .calc-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            font-family: var(--font-mono);
            letter-spacing: -0.3px;
        }
        .calc-result-area .calc-item .calc-value.positive {
            color: #10b981;
        }
        .calc-result-area .calc-item .calc-value.negative {
            color: #ef4444;
        }

        /* 列表页 */
        .summary-bar {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .summary-bar .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .summary-bar .summary-value {
            font-size: 28px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -1px;
        }
        .summary-bar .summary-value.green {
            color: #10b981;
        }
        .summary-bar .summary-value.red {
            color: #ef4444;
        }

        .record-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            position: relative;
            border: 1px solid transparent;
            transition: all var(--transition);
        }
        .record-card:hover {
            border-color: #e5e7eb;
        }
        .record-card .record-amount {
            font-size: 20px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .record-card .record-amount.gold {
            color: #b8860b;
        }
        .record-card .record-amount.black {
            color: #1a1a2e;
        }
        .record-card .record-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .record-card .record-meta .sep {
            color: #d1d5db;
        }
        .record-card .record-note {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
            font-style: italic;
        }
        .record-card .record-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }
        .record-card .action-btn {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            letter-spacing: 0.2px;
            background: #f3f4f6;
            color: #6b7280;
        }
        .record-card .action-btn:hover {
            background: #e5e7eb;
        }
        .record-card .action-btn.delete:hover {
            background: #fef2f2;
            color: #ef4444;
        }
        .record-card .action-btn.edit:hover {
            background: #eff6ff;
            color: #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
            font-size: 14px;
            letter-spacing: 0.2px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }
        .empty-state .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        /* 弹窗覆盖层 */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-overlay.z-101 {
            z-index: 101;
        }
        .modal-overlay.z-102 {
            z-index: 102;
        }
        .modal-overlay.z-103 {
            z-index: 103;
        }
        .modal-overlay.z-104 {
            z-index: 104;
        }
        .modal-overlay.z-105 {
            z-index: 105;
        }

        .modal-dialog {
            background: #fff;
            border-radius: var(--radius);
            padding: 22px 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.22s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .modal-dialog .modal-text {
            font-size: 15px;
            color: var(--text);
            margin-bottom: 18px;
            line-height: 1.5;
            letter-spacing: 0.1px;
        }
        .modal-dialog .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-dialog .modal-buttons .btn {
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 22px;
            min-width: 80px;
        }

        /* Toast提示 */
        .toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        /* 引导语 */
        .guide-text {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            padding: 4px 0;
            letter-spacing: 0.2px;
        }

        /* 按钮组在底部 */
        .form-bottom-actions {
            position: sticky;
            bottom: 0;
            background: var(--bg);
            padding: 12px 18px 20px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid transparent;
        }
        .form-bottom-actions .btn {
            flex: 1;
        }

        /* 业务记录详情行 */
        .biz-detail-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }
        .biz-detail-row span {
            background: #f9fafb;
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-family: var(--font-mono);
            letter-spacing: -0.2px;
            font-size: 11px;
        }

        /* 滚动条美化 */
        .page::-webkit-scrollbar {
            width: 4px;
        }
        .page::-webkit-scrollbar-track {
            background: transparent;
        }
        .page::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">

        <!-- ==================== 首页 ==================== -->
        <div class="page home-page active" id="homePage" data-page="home">
            <div class="logo-icon">📒</div>
            <div class="app-title">注册快记师</div>
            <div class="app-subtitle">Cupper的智能记账助手</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openTypeSelect('record')">开始记账</button>
                <button class="btn btn-secondary" onclick="openTypeSelect('list')">我的账目</button>
            </div>
        </div>

        <!-- ==================== 账目类型选择页 ==================== -->
        <div class="page type-select-page" id="typeSelectPage" data-page="typeSelect">
            <div class="page-header">
                <button class="close-btn" onclick="closeTypeSelect()" title="关闭">×</button>
                <span class="title">选择账目类型</span>
                <span class="placeholder"></span>
            </div>
            <div class="page-content">
                <div class="option-card" onclick="handleTypeChoice('daily')">
                    <div class="option-icon daily">📋</div>
                    <div class="option-info">
                        <h3>日常账目</h3>
                        <p>记录日常收入与支出</p>
                    </div>
                </div>
                <div class="option-card" onclick="handleTypeChoice('business')">
                    <div class="option-icon business">💼</div>
                    <div class="option-info">
                        <h3>生意账目</h3>
                        <p>记录生意经营数据</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== 日常账目记账页 ==================== -->
        <div class="page" id="dailyRecordPage" data-page="dailyRecord">
            <div class="page-header">
                <button class="close-btn" onclick="showExitConfirm('dailyRecord')" title="关闭">×</button>
                <span class="title">日常账目记账</span>
                <span class="placeholder"></span>
            </div>
            <div class="page-content" id="dailyRecordContent">
                <p class="guide-text">请输入基本的信息完成记账</p>
                <div class="form-group">
                    <label><span class="required-star">*</span>金额</label>
                    <input type="number" id="drAmount" placeholder="请输入金额" step="0.01" min="0.01" oninput="checkDailyRecordForm()">
                </div>
                <div class="form-group">
                    <label><span class="required-star">*</span>类别</label>
                    <select id="drType" onchange="onDailyTypeChange('record'); checkDailyRecordForm();">
                        <option value="">请选择类别</option>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="required-star">*</span>分类</label>
                    <select id="drCategory" onchange="checkDailyRecordForm()">
                        <option value="">请先选择类别</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="required-star">*</span>日期</label>
                    <input type="date" id="drDate" onchange="checkDailyRecordForm()">
                </div>
                <div class="form-group">
                    <label>渠道</label>
                    <select id="drChannel">
                        <option value="">不选择渠道</option>
                        <option value="现金">现金</option>
                        <option value="银行卡">银行卡</option>
                        <option value="微信钱包">微信钱包</option>
                        <option value="支付宝余额">支付宝余额</option>
                        <option value="信用卡">信用卡</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="drNote" placeholder="可输入任意备注文本"></textarea>
                </div>
            </div>
            <div class="form-bottom-actions">
                <button class="btn btn-gray" id="drSubmitBtn" disabled onclick="submitDailyRecord()">完成记账</button>
            </div>
        </div>

        <!-- ==================== 生意账目记账页 ==================== -->
        <div class="page" id="businessRecordPage" data-page="businessRecord">
            <div class="page-header">
                <button class="close-btn" onclick="showExitConfirm('businessRecord')" title="关闭">×</button>
                <span class="title">生意账目记账</span>
                <span class="placeholder"></span>
            </div>
            <div class="page-content" id="businessRecordContent">
                <p class="guide-text">请输入基本的信息完成记账</p>

    <script>
        (function() {
            // ============ 数据存储 ============
            const STORAGE_KEY_DAILY = 'daily_records';
            const STORAGE_KEY_BUSINESS = 'business_records';

            function getDailyRecords() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY_DAILY) || '[]');
                } catch (e) {
                    return [];
                }
            }

            function saveDailyRecords(records) {
                localStorage.setItem(STORAGE_KEY_DAILY, JSON.stringify(records));
            }

            function getBusinessRecords() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY_BUSINESS) || '[]');
                } catch (e) {
                    return [];
                }
            }

            function saveBusinessRecords(records) {
                localStorage.setItem(STORAGE_KEY_BUSINESS, JSON.stringify(records));
            }

            function generateId() {
                return Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
            }

            // ============ 音频 ============
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playDing() {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1800, now);
                    osc.frequency.exponentialRampToValueAtTime(2400, now + 0.06);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.18);
                    gain.gain.setValueAtTime(0.35, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } catch (e) {
                    // 静默处理音频播放失败
                }
            }

            // ============ 视图管理 ============
            let typeSelectContext = 'record'; // 'record' | 'list'
            let currentExitSource = null; // 当前退出确认的来源页面
            let pendingDeleteInfo = null; // 待删除记录信息 {type: 'daily'|'business', id: string}
            let currentEditId = null; // 当前修改的记录ID
            let currentEditType = null; // 'daily' | 'business'
            let pageZIndexCounter = 10; // 页面层级计数器

            function getAllPages() {
                return document.querySelectorAll('.page');
            }

            function hideAllPages() {
                getAllPages().forEach(p => {
                    p.classList.remove('active');
                    p.classList.remove('z-10', 'z-20', 'z-30', 'z-40', 'z-50');
                });
            }

            function showPage(pageId, zIndex) {
                const page = document.getElementById(pageId);
                if (!page) return;
                // 不隐藏所有页面，只将当前页面置于顶层
                if (zIndex) {
                    page.classList.add('z-' + zIndex);
                }
                page.classList.add('active');
                page.style.zIndex = zIndex || 1;
                page.scrollTop = 0;
            }

            function hidePage(pageId) {
                const page = document.getElementById(pageId);
                if (!page) return;
                page.classList.remove('active');
                page.classList.remove('z-10', 'z-20', 'z-30', 'z-40', 'z-50');
                page.style.zIndex = '';
            }

            function getActivePageZIndex(pageId) {
                const page = document.getElementById(pageId);
                if (!page) return 0;
                const z = parseInt(page.style.zIndex) || 1;
                return z;
            }

            function goHome() {
                // 关闭所有弹窗
                hideAllModals();
                // 隐藏所有页面
                const allPages = document.querySelectorAll('.page');
                allPages.forEach(p => {
                    p.classList.remove('active');
                    p.classList.remove('z-10', 'z-20', 'z-30', 'z-40', 'z-50');
                    p.style.zIndex = '';
                });
                // 显示首页
                const homePage = document.getElementById('homePage');
                homePage.classList.add('active');
                homePage.style.zIndex = '1';
                pageZIndexCounter = 10;
                currentExitSource = null;
                pendingDeleteInfo = null;
                currentEditId = null;
                currentEditType = null;
            }

            function hideAllModals() {
                document.getElementById('exitConfirmModal').classList.remove('active');
                document.getElementById('exitConfirmModal').classList.remove('z-101', 'z-102', 'z-103', 'z-104', 'z-105');
                document.getElementById('deleteConfirmModal').classList.remove('active');
                document.getElementById('deleteConfirmModal').classList.remove('z-101', 'z-102', 'z-103', 'z-104',
                'z-105');
            }

            function getNextZIndex() {
                pageZIndexCounter += 5;
                return pageZIndexCounter;
            }

            // ============ 类型选择 ============
            function openTypeSelect(context) {
                typeSelectContext = context;
                const z = getNextZIndex();
                hideAllModals();
                showPage('typeSelectPage', z);
            }

            function closeTypeSelect() {
                hidePage('typeSelectPage');
                goHome();
            }

            function handleTypeChoice(type) {
                if (typeSelectContext === 'record') {
                    // 进入记账页
                    if (type === 'daily') {
                        openDailyRecordPage();
                    } else {
                        openBusinessRecordPage();
                    }
                } else {
                    // 进入列表页
                    if (type === 'daily') {
                        openDailyListPage();
                    } else {
                        openBusinessListPage();
                    }
                }
                hidePage('typeSelectPage');
            }

            // ============ 日常账目记账页 ============
            function openDailyRecordPage() {
                const z = getNextZIndex();
                hideAllModals();
                // 重置表单
                document.getElementById('drAmount').value = '';
                document.getElementById('drType').value = '';
                document.getElementById('drCategory').innerHTML = '<option value="">请先选择类别</option>';
                document.getElementById('drDate').value = getTodayStr();
                document.getElementById('drChannel').value = '';
                document.getElementById('drNote').value = '';
                document.getElementById('drSubmitBtn').className = 'btn btn-gray';
                document.getElementById('drSubmitBtn').disabled = true;
                showPage('dailyRecordPage', z);
            }

            function getTodayStr() {
                const d = new Date();
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            }

            function onDailyTypeChange(context) {
                const typeVal = context === 'record' ?
                    document.getElementById('drType').value :
                    document.getElementById('deType').value;
                const catSelect = context === 'record' ?
                    document.getElementById('drCategory') :
                    document.getElementById('deCategory');

                catSelect.innerHTML = '<option value="">请选择分类</option>';
                if (typeVal === 'income') {
                    const cats = ['工资收入', '经营收入', '投资收入', '其它收入'];
                    cats.forEach(c => {
                        catSelect.innerHTML += `<option value="${c}">${c}</option>`;
                    });
                } else if (typeVal === 'expense') {
                    const cats = ['食品酒水', '行车交通', '居家物业', '交流通讯', '衣服饰品', '休闲娱乐', '医疗保健', '学习进修', '人情往来', '金融保险',
                        '其它支出'
                    ];
                    cats.forEach(c => {
                        catSelect.innerHTML += `<option value="${c}">${c}</option>`;
                    });
                }
                if (context === 'record') {
                    checkDailyRecordForm();
                } else {
                    checkDailyEditForm();
                }
            }

            function checkDailyRecordForm() {
                const amount = document.getElementById('drAmount').value;
                const typeVal = document.getElementById('drType').value;
                const category = document.getElementById('drCategory').value;
                const dateVal = document.getElementById('drDate').value;
                const btn = document.getElementById('drSubmitBtn');

                if (amount && parseFloat(amount) > 0 && typeVal && category && dateVal && isValidDate(dateVal)) {
                    btn.className = 'btn btn-blue';
                    btn.disabled = false;
                } else {
                    btn.className = 'btn btn-gray';
                    btn.disabled = true;
                }
            }

            function isValidDate(dateStr) {
                if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return false;
                const parts = dateStr.split('-');
                const y = parseInt(parts[0]);
                const m = parseInt(parts[1]);
                const d = parseInt(parts[2]);
                if (y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1) return false;
                const daysInMonth = new Date(y, m, 0).getDate();
                return d <= daysInMonth;
            }

            function submitDailyRecord() {
                const amount = parseFloat(document.getElementById('drAmount').value);
                const typeVal = document.getElementById('drType').value;
                const category = document.getElementById('drCategory').value;
                const dateVal = document.getElementById('drDate').value;
                const channel = document.getElementById('drChannel').value || null;
                const note = document.getElementById('drNote').value || null;

                if (!isValidDate(dateVal)) {
                    showToast('该日期不存在');
                    return;
                }

                const record = {
                    id: generateId(),
                    date: dateVal,
                    channel: channel,
                    note: note,
                    amount: Math.round(amount * 100) / 100,
                    type: typeVal,
                    category: category
                };

                const records = getDailyRecords();
                records.push(record);
                saveDailyRecords(records);

                showToast('记录完成');
                playDing();
                hidePage('dailyRecordPage');
                goHome();
            }

            // ============ 生意账目记账页 ============
            function openBusinessRecordPage() {
                const z = getNextZIndex();
                hideAllModals();
                document.getElementById('brEarning').value = '';
                document.getElementById('brVariableCost').value = '';
                document.getElementById('brFixedCost').value = '';
                document.getElementById('brCharacter').value = '';
                document.getElementById('brDate').value = getTodayStr();
                document.getElementById('brChannel').value = '';
                document.getElementById('brNote').value = '';
                document.getElementById('brSubmitBtn').className = 'btn btn-gray';
                document.getElementById('brSubmitBtn').disabled = true;
                resetBizCalcDisplay('record');
                showPage('businessRecordPage', z);
            }

            function resetBizCalcDisplay(context) {
                const prefix = context === 'record' ? 'br' : 'be';
                document.getElementById(prefix + 'GrossProfit').textContent = '--';
                document.getElementById(prefix + 'GrossProfit').className = 'calc-value';
                document.getElementById(prefix + 'GrossMargin').textContent = '--';
                document.getElementById(prefix + 'GrossMargin').className = 'calc-value';
                document.getElementById(prefix + 'NetProfit').textContent = '--';
                document.getElementById(prefix + 'NetProfit').className = 'calc-value';
                document.getElementById(prefix + 'TotalCost').textContent = '--';
                document.getElementById(prefix + 'TotalCost').className = 'calc-value';
            }

            function updateBizCalc(context) {
                const prefix = context === 'record' ? 'br' : 'be';
                const earning = parseFloat(document.getElementById(prefix + 'Earning').value) || 0;
                const variableCost = parseFloat(document.getElementById(prefix + 'VariableCost').value) || 0;
                const fixedCost = parseFloat(document.getElementById(prefix + 'FixedCost').value) || 0;

                const grossProfit = earning - variableCost;
                const grossMargin = earning > 0 ? (grossProfit / earning * 100) : 0;
                const netProfit = grossProfit - fixedCost;
                const totalCost = variableCost + fixedCost;

                const gpEl = document.getElementById(prefix + 'GrossProfit');
                const gmEl = document.getElementById(prefix + 'GrossMargin');
                const npEl = document.getElementById(prefix + 'NetProfit');
                const tcEl = document.getElementById(prefix + 'TotalCost');

                if (earning > 0 || variableCost > 0 || fixedCost > 0) {
                    gpEl.textContent = '¥' + grossProfit.toFixed(2);
                    gpEl.className = 'calc-value ' + (grossProfit >= 0 ? 'positive' : 'negative');
                    gmEl.textContent = grossMargin.toFixed(1) + '%';
                    gmEl.className = 'calc-value ' + (grossMargin >= 0 ? 'positive' : 'negative');
                    npEl.textContent = '¥' + netProfit.toFixed(2);
                    npEl.className = 'calc-value ' + (netProfit >= 0 ? 'positive' : 'negative');
                    tcEl.textContent = '¥' + totalCost.toFixed(2);
                    tcEl.className = 'calc-value';
                } else {
                    resetBizCalcDisplay(context);
                }
            }

            function checkBusinessRecordForm() {
                const earning = document.getElementById('brEarning').value;
                const variableCost = document.getElementById('brVariableCost').value;
                const fixedCost = document.getElementById('brFixedCost').value;
                const character = document.getElementById('brCharacter').value;
                const dateVal = document.getElementById('brDate').value;
                const btn = document.getElementById('brSubmitBtn');

                if (earning && parseFloat(earning) > 0 &&
                    variableCost && parseFloat(variableCost) > 0 &&
                    fixedCost && parseFloat(fixedCost) > 0 &&
                    character && character.trim() &&
                    dateVal && isValidDate(dateVal)) {
                    btn.className = 'btn btn-blue';
                    btn.disabled = false;
                } else {
                    btn.className = 'btn btn-gray';
                    btn.disabled = true;
                }
            }

            function submitBusinessRecord() {
                const earning = parseFloat(document.getElementById('brEarning').value);
                const variableCost = parseFloat(document.getElementById('brVariableCost').value);
                const fixedCost = parseFloat(document.getElementById('brFixedCost').value);
                const character = document.getElementById('brCharacter').value.trim();
                const dateVal = document.getElementById('brDate').value;
                const channel = document.getElementById('brChannel').value || null;
                const note = document.getElementById('brNote').value || null;

                if (!isValidDate(dateVal)) {
                    showToast('该日期不存在');
                    return;
                }

                const record = {
                    id: generateId(),
                    date: dateVal,
                    channel: channel,
                    note: note,
                    variable_cost: Math.round(variableCost * 100) / 100,
                    earning: Math.round(earning * 100) / 100,
                    fixed_cost: Math.round(fixedCost * 100) / 100,
                    character: character
                };

                const records = getBusinessRecords();
                records.push(record);
                saveBusinessRecords(records);

                showToast('记录完成');
                playDing();
                hidePage('businessRecordPage');
                goHome();
            }

            // ============ 日常账目列表页 ============
            function openDailyListPage() {
                const z = getNextZIndex();
                hideAllModals();
                renderDailyList();
                showPage('dailyListPage', z);
            }

            function renderDailyList() {
                const records = getDailyRecords();
                // 按日期从近到远排序
                records.sort((a, b) => b.date.localeCompare(a.date));

                // 计算余额
                let totalIncome = 0;
                let totalExpense = 0;
                records.forEach(r => {
                    if (r.type === 'income') totalIncome += r.amount;
                    if (r.type === 'expense') totalExpense += r.amount;
                });
                const balance = totalIncome - totalExpense;

                const summaryBar = document.getElementById('dailySummaryBar');
                const balanceDisplay = document.getElementById('dailyBalanceDisplay');
                if (balance >= 0) {
                    summaryBar.querySelector('.summary-label').textContent = '当前余额';
                    balanceDisplay.className = 'summary-value green';
                    balanceDisplay.textContent = '¥' + balance.toFixed(2);
                } else {
                    summaryBar.querySelector('.summary-label').textContent = '当前负债';
                    balanceDisplay.className = 'summary-value red';
                    balanceDisplay.textContent = '¥' + Math.abs(balance).toFixed(2);
                }

                const container = document.getElementById('dailyRecordsContainer');
                if (records.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state">
                      <div class="empty-icon">📭</div>
                      <div>您还没有记录过任何的账目呢，快去记一笔吧</div>
                    </div>`;
                } else {
                    container.innerHTML = records.map(r => {
                        const amountClass = r.type === 'income' ? 'gold' : 'black';
                        const sign = r.type === 'income' ? '+' : '-';
                        const channelHtml = r.channel ? `<span>${r.channel}</span>` : '';
                        const noteHtml = r.note ? `<div class="record-note">${r.note}</div>` : '';
                        return `
                      <div class="record-card" data-id="${r.id}">
                        <div class="record-amount ${amountClass}">${sign}¥${r.amount.toFixed(2)}</div>
                        <div class="record-meta">
                          <span>${r.category}</span>
                          <span class="sep">·</span>
                          <span>${r.date}</span>
                          ${channelHtml ? '<span class="sep">·</span>' + channelHtml : ''}
                        </div>
                        ${noteHtml}
                        <div class="record-actions">
                          <button class="action-btn edit" onclick="openDailyEdit('${r.id}')">修改</button>
                          <button class="action-btn delete" onclick="showDeleteConfirm('daily','${r.id}')">删除</button>
                        </div>
                      </div>`;
                    }).join('');
                }
            }

            // ============ 生意账目列表页 ============
            function openBusinessListPage() {
                const z = getNextZIndex();
                hideAllModals();
                renderBusinessList();
                showPage('businessListPage', z);
            }

            function renderBusinessList() {
                const records = getBusinessRecords();
                records.sort((a, b) => b.date.localeCompare(a.date));

                // 计算盈亏量
                let totalEarning = 0;
                let totalVarCost = 0;
                let totalFixedCost = 0;
                records.forEach(r => {
                    totalEarning += r.earning;
                    totalVarCost += r.variable_cost;
                    totalFixedCost += r.fixed_cost;
                });
                const pl = totalEarning - totalVarCost - totalFixedCost;

                const summaryBar = document.getElementById('businessSummaryBar');
                const plDisplay = document.getElementById('businessPLDisplay');
                if (pl >= 0) {
                    summaryBar.querySelector('.summary-label').textContent = '当前盈利';
                    plDisplay.className = 'summary-value green';
                    plDisplay.textContent = '¥' + pl.toFixed(2);
                } else {
                    summaryBar.querySelector('.summary-label').textContent = '当前亏损';
                    plDisplay.className = 'summary-value red';
                    plDisplay.textContent = '¥' + Math.abs(pl).toFixed(2);
                }

                const container = document.getElementById('businessRecordsContainer');
                if (records.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state">
                      <div class="empty-icon">📭</div>
                      <div>您还没有记录过任何的账目呢，快去记一笔吧</div>
                    </div>`;
                } else {
                    container.innerHTML = records.map(r => {
                        const grossProfit = r.earning - r.variable_cost;
                        const grossMargin = r.earning > 0 ? (grossProfit / r.earning * 100) : 0;
                        const netProfit = grossProfit - r.fixed_cost;
                        const totalCost = r.variable_cost + r.fixed_cost;
                        const channelHtml = r.channel ? `<span>${r.channel}</span>` : '';
                        const noteHtml = r.note ? `<div class="record-note">${r.note}</div>` : '';
                        return `
                      <div class="record-card" data-id="${r.id}">
                        <div class="record-amount" style="color:#1a1a2e;font-size:18px;">收款 ¥${r.earning.toFixed(2)}</div>
                        <div class="biz-detail-row">
                          <span>总成本 ¥${totalCost.toFixed(2)}</span>
                          <span>毛利 ¥${grossProfit.toFixed(2)}</span>
                          <span>纯利 ¥${netProfit.toFixed(2)}</span>
                          <span>毛利率 ${grossMargin.toFixed(1)}%</span>
                        </div>
                        <div class="record-meta" style="margin-top:4px;">
                          <span>${r.character}</span>
                          <span class="sep">·</span>
                          <span>${r.date}</span>
                          ${channelHtml ? '<span class="sep">·</span>' + channelHtml : ''}
                        </div>
                        ${noteHtml}
                        <div class="record-actions">
                          <button class="action-btn edit" onclick="openBusinessEdit('${r.id}')">修改</button>
                          <button class="action-btn delete" onclick="showDeleteConfirm('business','${r.id}')">删除</button>
                        </div>
                      </div>`;
                    }).join('');
                }
            }

            // ============ 日常账目修改页 ============
            function openDailyEdit(recordId) {
                const z = getNextZIndex();
                hideAllModals();
                currentEditId = recordId;
                currentEditType = 'daily';
                const records = getDailyRecords();
                const record = records.find(r => r.id === recordId);
                if (!record) {
                    showToast('记录未找到');
                    return;
                }

                document.getElementById('deAmount').value = record.amount;
                document.getElementById('deType').value = record.type;
                // 填充分类
                onDailyTypeChange('edit');
                document.getElementById('deCategory').value = record.category;
                document.getElementById('deDate').value = record.date;
                document.getElementById('deChannel').value = record.channel || '';
                document.getElementById('deNote').value = record.note || '';
                document.getElementById('deSubmitBtn').className = 'btn btn-blue';
                document.getElementById('deSubmitBtn').disabled = false;
                checkDailyEditForm();
                showPage('dailyEditPage', z);
            }

            function checkDailyEditForm() {
                const amount = document.getElementById('deAmount').value;
                const typeVal = document.getElementById('deType').value;
                const category = document.getElementById('deCategory').value;
                const dateVal = document.getElementById('deDate').value;
                const btn = document.getElementById('deSubmitBtn');

                if (amount && parseFloat(amount) > 0 && typeVal && category && dateVal && isValidDate(dateVal)) {
                    btn.className = 'btn btn-blue';
                    btn.disabled = false;
                } else {
                    btn.className = 'btn btn-gray';
                    btn.disabled = true;
                }
            }

            function submitDailyEdit() {
                const amount = parseFloat(document.getElementById('deAmount').value);
                const typeVal = document.getElementById('deType').value;
                const category = document.getElementById('deCategory').value;
                const dateVal = document.getElementById('deDate').value;
                const channel = document.getElementById('deChannel').value || null;
                const note = document.getElementById('deNote').value || null;

                if (!isValidDate(dateVal)) {
                    showToast('该日期不存在');
                    return;
                }

                const records = getDailyRecords();
                const idx = records.findIndex(r => r.id === currentEditId);
                if (idx === -1) {
                    showToast('记录未找到');
                    return;
                }

                records[idx].amount = Math.round(amount * 100) / 100;
                records[idx].type = typeVal;
                records[idx].category = category;
                records[idx].date = dateVal;
                records[idx].channel = channel;
                records[idx].note = note;
                saveDailyRecords(records);

                showToast('修改完成');
                playDing();
                hidePage('dailyEditPage');
                currentEditId = null;
                currentEditType = null;
                renderDailyList();
                // 返回列表页
                const listPage = document.getElementById('dailyListPage');
                if (listPage.classList.contains('active')) {
                    // 列表页仍在活跃，刷新即可
                } else {
                    openDailyListPage();
                }
            }

            // ============ 生意账目修改页 ============
            function openBusinessEdit(recordId) {
                const z = getNextZIndex();
                hideAllModals();
                currentEditId = recordId;
                currentEditType = 'business';
                const records = getBusinessRecords();
                const record = records.find(r => r.id === recordId);
                if (!record) {
                    showToast('记录未找到');
                    return;
                }

                document.getElementById('beEarning').value = record.earning;
                document.getElementById('beVariableCost').value = record.variable_cost;
                document.getElementById('beFixedCost').value = record.fixed_cost;
                document.getElementById('beCharacter').value = record.character;
                document.getElementById('beDate').value = record.date;
                document.getElementById('beChannel').value = record.channel || '';
                document.getElementById('beNote').value = record.note || '';
                updateBizCalc('edit');
                document.getElementById('beSubmitBtn').className = 'btn btn-blue';
                document.getElementById('beSubmitBtn').disabled = false;
                checkBusinessEditForm();
                showPage('businessEditPage', z);
            }

            function checkBusinessEditForm() {
                const earning = document.getElementById('beEarning').value;
                const variableCost = document.getElementById('beVariableCost').value;
                const fixedCost = document.getElementById('beFixedCost').value;
                const character = document.getElementById('beCharacter').value;
                const dateVal = document.getElementById('beDate').value;
                const btn = document.getElementById('beSubmitBtn');

                if (earning && parseFloat(earning) > 0 &&
                    variableCost && parseFloat(variableCost) > 0 &&
                    fixedCost && parseFloat(fixedCost) > 0 &&
                    character && character.trim() &&
                    dateVal && isValidDate(dateVal)) {
                    btn.className = 'btn btn-blue';
                    btn.disabled = false;
                } else {
                    btn.className = 'btn btn-gray';
                    btn.disabled = true;
                }
            }

            function submitBusinessEdit() {
                const earning = parseFloat(document.getElementById('beEarning').value);
                const variableCost = parseFloat(document.getElementById('beVariableCost').value);
                const fixedCost = parseFloat(document.getElementById('beFixedCost').value);
                const character = document.getElementById('beCharacter').value.trim();
                const dateVal = document.getElementById('beDate').value;
                const channel = document.getElementById('beChannel').value || null;
                const note = document.getElementById('beNote').value || null;

                if (!isValidDate(dateVal)) {
                    showToast('该日期不存在');
                    return;
                }

                const records = getBusinessRecords();
                const idx = records.findIndex(r => r.id === currentEditId);
                if (idx === -1) {
                    showToast('记录未找到');
                    return;
                }

                records[idx].earning = Math.round(earning * 100) / 100;
                records[idx].variable_cost = Math.round(variableCost * 100) / 100;
                records[idx].fixed_cost = Math.round(fixedCost * 100) / 100;
                records[idx].character = character;
                records[idx].date = dateVal;
                records[idx].channel = channel;
                records[idx].note = note;
                saveBusinessRecords(records);

                showToast('修改完成');
                playDing();
                hidePage('businessEditPage');
                currentEditId = null;
                currentEditType = null;
                renderBusinessList();
                const listPage = document.getElementById('businessListPage');
                if (!listPage.classList.contains('active')) {
                    openBusinessListPage();
                }
            }

            // ============ 退出确认弹窗 ============
            function showExitConfirm(sourcePage) {
                currentExitSource = sourcePage;
                const modal = document.getElementById('exitConfirmModal');
                const continueBtn = document.getElementById('exitContinueBtn');
                const abandonBtn = document.getElementById('exitAbandonBtn');

                // 根据来源设置按钮文案
                const isEdit = (sourcePage === 'dailyEdit' || sourcePage === 'businessEdit');
                if (isEdit) {
                    continueBtn.textContent = '继续修改';
                    abandonBtn.textContent = '放弃修改';
                } else {
                    continueBtn.textContent = '继续记账';
                    abandonBtn.textContent = '放弃记账';
                }

                // 更新弹窗文案
                modal.querySelector('.modal-text').textContent = '您现在的账目未保存，是否退出';

                modal.classList.add('active');
                modal.style.zIndex = getNextZIndex() + 50;

                // 绑定事件（先解绑再绑定）
                continueBtn.onclick = function() {
                    modal.classList.remove('active');
                    modal.style.zIndex = '';
                    currentExitSource = null;
                };
                abandonBtn.onclick = function() {
                    modal.classList.remove('active');
                    modal.style.zIndex = '';
                    const src = currentExitSource;
                    currentExitSource = null;
                    hidePage(src + 'Page');
                    if (src === 'dailyEdit' || src === 'businessEdit') {
                        // 返回列表页
                        if (src === 'dailyEdit') {
                            currentEditId = null;
                            currentEditType = null;
                            renderDailyList();
                            const listPage = document.getElementById('dailyListPage');
                            if (!listPage.classList.contains('active')) {
                                openDailyListPage();
                            }
                        } else {
                            currentEditId = null;
                            currentEditType = null;
                            renderBusinessList();
                            const listPage = document.getElementById('businessListPage');
                            if (!listPage.classList.contains('active')) {
                                openBusinessListPage();
                            }
                        }
                    } else {
                        goHome();
                    }
                };
            }

            // ============ 删除确认弹窗 ============
            function showDeleteConfirm(type, recordId) {
                pendingDeleteInfo = { type, id: recordId };
                const modal = document.getElementById('deleteConfirmModal');
                modal.querySelector('.modal-text').textContent = '删除的账目将无法恢复，您确定吗？';
                modal.classList.add('active');
                modal.style.zIndex = getNextZIndex() + 50;

                document.getElementById('deleteConfirmBtn').onclick = function() {
                    modal.classList.remove('active');
                    modal.style.zIndex = '';
                    const info = pendingDeleteInfo;
                    pendingDeleteInfo = null;
                    if (info.type === 'daily') {
                        const records = getDailyRecords();
                        const filtered = records.filter(r => r.id !== info.id);
                        saveDailyRecords(filtered);
                        renderDailyList();
                    } else {
                        const records = getBusinessRecords();
                        const filtered = records.filter(r => r.id !== info.id);
                        saveBusinessRecords(filtered);
                        renderBusinessList();
                    }
                };
                document.getElementById('deleteCancelBtn').onclick = function() {
                    modal.classList.remove('active');
                    modal.style.zIndex = '';
                    pendingDeleteInfo = null;
                };
            }

            // ============ Toast ============
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1500);
            }

            // ============ 初始化 ============
            function init() {
                // 设置默认日期
                const today = getTodayStr();
                document.getElementById('drDate').value = today;
                document.getElementById('brDate').value = today;
                document.getElementById('deDate').value = today;
                document.getElementById('beDate').value = today;

                // 初始化分类下拉（当类别改变时触发）
                // 默认显示首页
                goHome();

                // 确保所有弹窗关闭
                hideAllModals();
            }

            // ============ 全局暴露 ============
            window.openTypeSelect = openTypeSelect;
            window.closeTypeSelect = closeTypeSelect;
            window.handleTypeChoice = handleTypeChoice;
            window.goHome = goHome;
            window.showExitConfirm = showExitConfirm;
            window.showDeleteConfirm = showDeleteConfirm;
            window.onDailyTypeChange = onDailyTypeChange;
            window.checkDailyRecordForm = checkDailyRecordForm;
            window.checkDailyEditForm = checkDailyEditForm;
            window.submitDailyRecord = submitDailyRecord;
            window.submitDailyEdit = submitDailyEdit;
            window.checkBusinessRecordForm = checkBusinessRecordForm;
            window.checkBusinessEditForm = checkBusinessEditForm;
            window.submitBusinessRecord = submitBusinessRecord;
            window.submitBusinessEdit = submitBusinessEdit;
            window.updateBizCalc = updateBizCalc;
            window.openDailyEdit = openDailyEdit;
            window.openBusinessEdit = openBusinessEdit;

            // 启动
            init();
            console.log('📒 注册快记师 - Cupper的智能记账助手 已就绪');
        })();

        // ==================== PWA: 注册 Service Worker ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 注册成功，范围:', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker 注册失败:', err);
                    });
            });
        }
    </script>
</body>
</html>
